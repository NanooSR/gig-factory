<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap Rush</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Tap Rush</h1>
    <p>Tap the target as many times as possible in 10 seconds.</p>
    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="time">10</strong></span>
    </div>
    <button id="target">Tap Me</button>
    <div class="actions">
      <button id="startBtn">Start Game</button>
      <button id="restartBtn">Restart</button>
    </div>
    <p id="status">Press Start to play.</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
